upstream bestcar {
  server 127.0.0.1:3061 fail_timeout=0;
}

# Backend API Server
server {
  listen 80;
  server_name api.bestcar-mr.com;
  root /var/www/bestcar/backend/public;

  try_files $uri/index.html $uri @bestcar;

  access_log /var/log/nginx/bestcar-api.access.log;
  error_log /var/log/nginx/bestcar-api.error.log;

  location @bestcar {
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Host $host;
    proxy_redirect off;
    proxy_set_header Connection '';
    proxy_pass http://bestcar;
  }

  location ~ ^/(assets|fonts|system|packs)/|favicon.ico|robots.txt|android-chrome-144x144.png|apple-touch-icon-precomposed.png|apple-touch-icon.png|browserconfig.xml|favicon-16x16.png|favicon-32x32.png|mstile-150x150.png|site.webmanifest {
    gzip_static on;
    expires max;
    add_header Cache-Control public;
  }

  error_page 500 502 503 504 /500.html;
  client_max_body_size 50M;
  keepalive_timeout 10;
}

# Frontend Server
server {
  listen 80;
  server_name bestcar-mr.com;

  root /var/www/bestcar/client/dist;

  location / {
    index index.html index.htm;
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    proxy_pass http://api.bestcar-mr.com/api/;
    proxy_redirect default;
  }

  # Compression
  gzip on;

  location ~* \.(?:css|js) {
    gzip_static on;
    expires max;
    add_header Cache-Control public;
  }

  location ~* \.(?:jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|woff|ttf|otf|woff2|eot)$ {
    gzip_static on;
    access_log off;
    expires max;
    add_header Cache-Control public;
  }

  error_page 500 502 503 504 /500.html;
  client_max_body_size 50M;
  keepalive_timeout 10;
}
